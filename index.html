<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G-ESG | Access Control</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>

<body>
    <!-- 로그인 영역 -->
    <div id="login-overlay">
        <div class="login-card">
            <h2>G-ESG LOGIN</h2>
            <div class="input-group">
                <label>USER NAME</label>
                <input type="text" id="username" placeholder="이름을 입력하세요" autocomplete="off">
            </div>
            <div class="input-group">
                <label>PASSWORD</label>
                <input type="password" id="password" placeholder="암호를 입력하세요">
            </div>
            <button onclick="checkLogin()">UNLOCK SYSTEM</button>
        </div>
    </div>

    <!-- 메인 콘텐츠 영역 -->
    <div id="main-content">
        <h1 class="welcome-text">Hello , ESG !!!</h1>
    </div>

    <script src="script.js"></script>
</body>

</html>
