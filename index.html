<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G-ESG | Access Control</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>

<body>
    <!-- 로그인 영역 -->
    <div id="login-overlay">
        <div class="login-card">
            <h2>Green ESG Platform</h2>
            <div class="input-group">
                <label>계정명</label>
                <input type="text" id="username" placeholder="이름을 입력하세요" autocomplete="off">
            </div>
            <div class="input-group">
                <label>암호</label>
                <input type="password" id="password" placeholder="암호를 입력하세요">
            </div>
            <button onclick="checkLogin()">로그인</button>
        </div>
    </div>

    <!-- 메인 콘텐츠 영역 -->
    <div id="main-content">
        <header class="main-header">
            <div class="project-info">
                <span class="label">PROJECT</span>
                <h1 id="project-title">최초작업</h1>
            </div>
            <div class="user-actions">
                <span class="user-badge">SAYURI</span>
                <button class="btn-logout" onclick="location.reload()">LOGOUT</button>
            </div>
        </header>

        <main class="dashboard">
            <!-- Left: Reference Materials -->
            <section class="panel ref-panel" id="ref-panel">
                <div class="panel-header">
                    <h3>📚 참고 자료 학습 등록</h3>
                    <button class="btn-add-mini" onclick="document.getElementById('file-input').click()">+</button>
                    <input type="file" id="file-input" style="display:none" accept=".pdf,.doc,.docx"
                        onchange="handleFileSelect(event)">
                </div>
                <div id="ref-list" class="ref-list">
                    <div class="empty-state">PDF, DOC 파일을<br>여기에 드래그하거나 등록하세요</div>
                </div>
                <div class="drop-zone-overlay" id="drop-zone-overlay">
                    <div class="overlay-content">📂 파일을 놓으세요</div>
                </div>
            </section>

            <!-- Middle: TOC Creation -->
            <section class="panel toc-panel">
                <div class="panel-header">
                    <h3>📝 목차 구성</h3>
                    <div class="toc-controls">
                        <span class="control-label">Chapter:</span>
                        <select id="chapter-count" class="select-mini"></select>
                        <span class="control-label">단계:</span>
                        <select id="toc-level" class="select-mini">
                            <option value="1">1단계</option>
                            <option value="2" selected>2단계</option>
                            <option value="3">3단계</option>
                        </select>
                        <button class="btn-execute-mini" onclick="suggestToc()">목차생성</button>
                        <button class="btn-clear-mini" onclick="clearToc()">삭제</button>
                    </div>
                </div>
                <div class="toc-editor-wrap">
                    <textarea id="toc-editor" placeholder="여기에 목차를 입력하거나 '분석' 버튼을 눌러 자동 생성하세요..."></textarea>
                </div>
            </section>

            <!-- Right: Output & Controls -->
            <section class="panel output-panel">
                <div class="panel-header header-toolbar">
                    <h3>🖥️ 리포트 작성 및 출력</h3>
                    <div class="toolbar-actions">
                        <div class="page-control">
                            <span class="control-label">Pages:</span>
                            <input type="number" id="page-count-input" value="3" min="1" max="50">
                        </div>
                        <button class="btn-execute-mini btn-primary-glow" onclick="executeAnalysis()">문서 작성</button>
                        <button class="btn-execute-mini" onclick="saveAsDoc()">.DOC 저장</button>
                        <button class="btn-clear-mini" onclick="clearOutput()">삭제</button>
                    </div>
                </div>
                <div id="output-screen" class="output-screen">
                    <div class="terminal-placeholder">실행 버튼을 누르면 분석이 시작됩니다...</div>
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>

</html>
